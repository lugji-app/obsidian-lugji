# Lugji Obsidian Plugin — Release workflow
#
# Triggers on tag push (e.g. `git tag 1.0.0 && git push origin 1.0.0`).
# Builds the plugin and attaches main.js / manifest.json / styles.css
# as release artifacts — the three files Obsidian Community Plugins
# marketplace pulls when users install.
#
# When this plugin is extracted from the lugji-monorepo into its own
# standalone GitHub repo, this file lives at .github/workflows/release.yml
# at repo root. Inside the monorepo it sits at obsidian-plugin/.github/
# and is dormant (GitHub only reads workflows from repo-root .github/).

name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f main.js || (echo "main.js missing"; exit 1)
          test -f manifest.json || (echo "manifest.json missing"; exit 1)
          test -f styles.css || (echo "styles.css missing"; exit 1)

      - name: Read manifest version
        id: manifest
        run: |
          VERSION=$(jq -r .version manifest.json)
          TAG=${GITHUB_REF#refs/tags/}
          if [ "$VERSION" != "$TAG" ]; then
            echo "Manifest version ($VERSION) does not match tag ($TAG)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.manifest.outputs.version }}
          tag_name: ${{ steps.manifest.outputs.version }}
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
          generate_release_notes: true
